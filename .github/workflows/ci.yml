name: CI — Governance Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  governance:
    name: Governance Gates (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -e ".[dev]"

      - name: Run governance tests (includes test_no_L5)
        run: pytest src/governance/ -v --tb=short

      - name: Run point-in-time integrity tests
        run: pytest src/ingest/ -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/

      - name: Ruff format check
        run: ruff format --check src/
